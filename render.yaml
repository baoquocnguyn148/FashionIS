services:
  # ─── Main ASP.NET Core Application ─────────────────────────────────
  - type: web
    name: fashion-store-web
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    # Render's Free Plan doesn't support persisting everything, but we can try
    plan: free
    region: singapore
    healthCheckPath: /
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Development
      - key: POSTGRES_CONNECTION_STRING
        fromDatabase:
          name: fashion-db
          property: connectionString
      - key: ANALYTICS_CONNECTION_STRING
        fromDatabase:
          name: fashion-db
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: fashion-db
          property: connectionString
      - key: CHATBOT_URL
        fromService:
          name: fashion-store-chatbot
          type: web
          property: hostport

  # ─── Python AI Shopping Assistant ───────────────────────────────────
  - type: web
    name: fashion-store-chatbot
    env: docker
    dockerContext: .
    dockerfilePath: chatbot/Dockerfile.chatbot
    plan: free
    region: singapore
    envVars:
      - key: GROQ_API_KEY
        sync: false # User to provide in Render Dashboard
      - key: GROQ_MODEL
        value: "llama-3.1-8b-instant"
      - key: BACKEND_API_URL
        fromService:
          name: fashion-store-web
          type: web
          property: hostport
      - key: WEB_BASE_URL
        fromService:
          name: fashion-store-web
          type: web
          property: url

databases:
  # Defining the DB in blueprint makes it easy for Render to link
  - name: fashion-db
    plan: free
    region: singapore
    databaseName: fashionstore_migrated
